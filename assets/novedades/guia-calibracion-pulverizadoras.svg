    <circle cx="240" cy="297" r="10"/>
    <circle cx="320" cy="297" r="10"/>
    <circle cx="400" cy="297" r="10"/>
    <circle cx="460" cy="297" r="10"/>
  </g>
  <!-- spray cones -->
  <g fill="#f8f9fc" opacity="0.55">
    <path d="M160 307 L145 350 L175 350 Z"/>
    <path d="M240 307 L225 350 L255 350 Z"/>
    <path d="M320 307 L305 350 L335 350 Z"/>
    <path d="M400 307 L385 350 L415 350 Z"/>
    <path d="M460 307 L445 350 L475 350 Z"/>
