  <!-- slider control (calibración) -->
  <rect x="220" y="200" width="160" height="10" rx="5" fill="#f8f9fc" opacity="0.4"/>
  <circle cx="330" cy="205" r="14" fill="#e6b920"/>
  <text x="300" y="470" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#f8f9fc" text-anchor="middle" opacity="0.85">Calibración de Pulverizadoras</text>
</svg>
