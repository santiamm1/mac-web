<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b903e"/>
      <stop offset="1" stop-color="#273516"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg2)"/>
  <g fill="#ffffff" opacity="0.06">
    <circle cx="60" cy="80" r="4"/><circle cx="120" cy="140" r="4"/><circle cx="500" cy="90" r="4"/>
    <circle cx="540" cy="480" r="4"/><circle cx="90" cy="520" r="4"/><circle cx="460" cy="540" r="4"/>
  </g>
  <!-- sprayer boom -->
  <rect x="120" y="290" width="360" height="14" rx="7" fill="#f8f9fc" opacity="0.9"/>
